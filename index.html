<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claudlytics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
    overflow: hidden;
  }

  .titlebar {
    background: #161b22;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #30363d;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }

  .titlebar-title {
    font-size: 12px;
    font-weight: 600;
    color: #8b949e;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .titlebar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-app-region: no-drag;
  }

  .refresh-btn {
    background: none;
    border: none;
    color: #8b949e;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .refresh-btn:hover { color: #e6edf3; }

  .last-updated {
    font-size: 10px;
    color: #484f58;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #484f58;
    margin-bottom: 6px;
  }

  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 10px 12px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card-cost {
    font-size: 15px;
    font-weight: 700;
    color: #3fb950;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-size: 9px;
    color: #484f58;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-value {
    font-size: 12px;
    font-weight: 600;
    color: #c9d1d9;
    font-variant-numeric: tabular-nums;
  }

  .cycle-bar-wrap {
    margin-top: 4px;
  }

  .cycle-bar-bg {
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    overflow: hidden;
  }

  .cycle-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #388bfd, #3fb950);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .cycle-label {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }

  .cycle-label span {
    font-size: 10px;
    color: #484f58;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }
  .dot-session { background: #388bfd; }
  .dot-today   { background: #f78166; }
  .dot-week    { background: #e3b341; }
  .dot-month   { background: #3fb950; }

  .loading {
    color: #484f58;
    font-size: 12px;
    text-align: center;
    padding: 40px 0;
  }

  .api-badge {
    font-size: 9px;
    background: #1f2d3d;
    color: #388bfd;
    border: 1px solid #1f4068;
    border-radius: 3px;
    padding: 1px 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .limit-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 8px;
  }
  .limit-row:last-child { margin-bottom: 0; }

  .limit-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .limit-name {
    font-size: 11px;
    font-weight: 600;
    color: #c9d1d9;
  }

  .limit-meta {
    font-size: 10px;
    color: #484f58;
  }

  .limit-bar-bg {
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    overflow: hidden;
  }

  .limit-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .limit-bar-fill.session { background: #388bfd; }
  .limit-bar-fill.weekly  { background: #e3b341; }

  .limit-footer {
    display: flex;
    justify-content: space-between;
  }

  .limit-pct {
    font-size: 10px;
    font-weight: 600;
    color: #8b949e;
  }

  .limit-reset {
    font-size: 10px;
    color: #484f58;
  }
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-title">⚡ Claudlytics</span>
  <div class="titlebar-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" onclick="load()" title="Refresh">↻</button>
  </div>
</div>

<div class="content" id="content">
  <div class="loading">Loading…</div>
</div>

<script>
function formatMins(totalMins) {
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  if (h > 0) return `${h} hr ${m} min`;
  return `${m} min`;
}

function formatResetDate(isoString) {
  const d = new Date(isoString);
  return d.toLocaleString([], { weekday: "short", hour: "numeric", minute: "2-digit" });
}

function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
  return n.toString();
}

function fmtCost(c) {
  if (c < 0.01) return "<$0.01";
  return "$" + c.toFixed(2);
}

function renderCard(label, dotClass, data) {
  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="dot ${dotClass}"></span>${label}</span>
        <span class="card-cost">${fmtCost(data.cost)}</span>
      </div>
      <div class="stats-grid">
        <div class="stat">
          <span class="stat-label">Input</span>
          <span class="stat-value">${fmt(data.input)}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Output</span>
          <span class="stat-value">${fmt(data.output)}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Cache Read</span>
          <span class="stat-value">${fmt(data.cacheRead)}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Cache Write</span>
          <span class="stat-value">${fmt(data.cacheWrite)}</span>
        </div>
      </div>
    </div>`;
}

function renderPlanLimits(sw, week) {
  // sw = sessionWindow (last 5 hours across all projects)
  // week = last 7 days
  const now = Date.now();

  // Session row
  const sessionTokens = (sw.input || 0) + (sw.output || 0);
  let resetLabel = "";
  if (sw.resetAtMs) {
    const msLeft = sw.resetAtMs - now;
    if (msLeft > 0) {
      resetLabel = "Resets in " + formatMins(Math.round(msLeft / 60000));
    } else {
      resetLabel = "Window clear";
    }
  }

  // Weekly row
  const weekTokens = (week.input || 0) + (week.output || 0);
  const weekResetMs = (() => {
    // Find next Monday at midnight UTC (Claude's weekly reset is Mon 00:00 UTC)
    const d = new Date();
    const day = d.getUTCDay(); // 0=Sun,1=Mon,...
    const daysUntilMon = day === 1 ? 7 : (8 - day) % 7;
    const next = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() + daysUntilMon));
    return next.getTime();
  })();
  const weekResetLabel = "Resets " + formatResetDate(new Date(weekResetMs).toISOString());

  return `<div class="card">
    <div class="card-header">
      <span class="card-title"><span class="dot" style="background:#a371f7;margin-right:5px"></span>Plan Usage (Claude Pro)</span>
    </div>
    <div class="limit-row">
      <div class="limit-header"><span class="limit-name">Current Session (5 hr window)</span></div>
      <div class="limit-footer" style="margin-top:2px">
        <span class="limit-pct">${fmt(sessionTokens)} tokens · ${sw.messages || 0} msgs</span>
        <span class="limit-reset">${resetLabel}</span>
      </div>
    </div>
    <div class="limit-row">
      <div class="limit-header"><span class="limit-name">This Week</span></div>
      <div class="limit-footer" style="margin-top:2px">
        <span class="limit-pct">${fmt(weekTokens)} tokens · ${week.messages || 0} msgs</span>
        <span class="limit-reset">${weekResetLabel}</span>
      </div>
    </div>
  </div>`;
}

async function load() {
  const content = document.getElementById("content");
  const upd = document.getElementById("lastUpdated");

  try {
    const d = await fetch("/api/usage").then(r => r.json());
    upd.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    let html = "";

    // Plan usage at top (calculated from local JSONL files)
    html += renderPlanLimits(d.sessionWindow, d.week);

    html += renderCard("Current Session", "dot-session", d.session);
    html += renderCard("Today", "dot-today", d.today);
    html += renderCard("Last 7 Days", "dot-week", d.week);

    // Billing cycle bar
    const pct = Math.round(d.cycleProgress * 100);
    html += `
      <div class="card">
        <div class="card-header">
          <span class="card-title"><span class="dot dot-month"></span>Billing Cycle</span>
          <span class="card-cost">${fmtCost(d.month.cost)}</span>
        </div>
        <div class="cycle-bar-wrap">
          <div class="cycle-bar-bg">
            <div class="cycle-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="cycle-label">
            <span>Day ${d.cycleDay} of ${d.daysInMonth}</span>
            <span>${pct}% through</span>
          </div>
        </div>
      </div>`;

    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = `<div class="loading">Error loading data</div>`;
  }
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
